name: Actualizar Modelos Gratuitos

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install requests beautifulsoup4

      - name: Ejecutar generador
        run: python generador_modelos.py --no-notify

      - name: Verificar cambios
        id: git-check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commitear y pushear cambios
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html estado_modelos.json
          git diff --cached --quiet || git commit -m "auto: actualizar modelos gratuitos $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
